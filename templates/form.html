<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Name</h1>
    <form action="/name" method="post">
        <input type="text" name="username">
        <input type="submit" value="submit">
    </form>
    <h1>Calculate</h1>
    <form action="/calculate" method="post">
        <input type="text" name="num1">
        <input type="text" name="num2">
        <input type="radio" name="operator" id="sum" value="sum" checked>
        <label for="sum">Summation</label>
        <input type="radio" name="operator" id="dif" value="dif">
        <label for="dif">Difference</label>
        <input type="radio" name="operator" id="pro" value="pro">
        <label for="pro">Product</label>
        <input type="radio" name="operator" id="quo" value="quo">
        <label for="quo">Quotient</label>
        <input type="submit" value="submit">
    </form>
    <h1>Omikuji</h1>
    <form action="/omikuji" method="post">
        <input type="submit" value="omikuji">
    </form>
    <h1>Even Odd</h1>
    <form action="/check" method="post">
        <input type="text" name="num">
        <input type="submit">
    </form>
</body>
</html>
